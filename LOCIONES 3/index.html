<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lociones — Catálogo</title>
<meta name="description" content="Catálogo de lociones y perfumes originales.">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e2bb"/>
      <stop offset="22%" stop-color="#cfa25a"/>
      <stop offset="45%" stop-color="#6b5636"/>
      <stop offset="55%" stop-color="#b08d57"/>
      <stop offset="78%" stop-color="#e8dcc5"/>
      <stop offset="100%" stop-color="#6b5636"/>
    </linearGradient>
  </defs>
</svg>

<header class="site-header">
  <div class="container header-inner">
    <a class="brand" id="homeLink" href="index.html" aria-label="Ir al inicio">
      <span class="brand-mark">L</span>
      <div class="brand-text">
        <h1>LOCIONES</h1>
        <p>Perfumes originales</p>
      </div>
    </a>
    <a class="whatsapp-header-link" id="headerWhatsapp" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.48 1.32 5L2 22l5.24-1.38a9.9 9.9 0 0 0 4.8 1.22h.01c5.46 0 9.9-4.45 9.9-9.91C22 6.45 17.5 2 12.04 2zm5.8 14.03c-.24.68-1.4 1.3-1.93 1.38-.5.08-1.12.11-1.8-.11-.42-.13-.95-.31-1.63-.6-2.87-1.24-4.74-4.15-4.88-4.34-.14-.19-1.17-1.56-1.17-2.98s.73-2.12.99-2.4c.26-.29.56-.36.75-.36l.54.01c.17.01.4-.06.63.48.24.56.8 1.95.87 2.09.07.14.12.31.02.5-.09.19-.14.31-.28.47-.14.16-.29.36-.42.48-.14.13-.28.28-.12.55.16.28.71 1.17 1.53 1.9 1.05.94 1.94 1.23 2.21 1.37.28.14.44.12.6-.07.17-.19.71-.83.9-1.11.19-.28.38-.23.63-.14.26.1 1.64.77 1.92.91.28.14.47.21.54.33.07.12.07.68-.17 1.36z"/></svg>
      <span>Pedidos por WhatsApp</span>
    </a>
  </div>
</header>

<main class="container">

  <section class="toolbar">
    <div class="toolbar-left">
      <div class="dropdown-wrap">
        <button class="icon-btn" id="menuToggle" aria-haspopup="true" aria-expanded="false" aria-label="Filtrar por categoría o marca">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="url(#goldMetal)" d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
        </button>
        <div class="category-dropdown" id="categoryDropdown" hidden>
          <p class="dropdown-label">Categoría</p>
          <button class="dropdown-item active" data-filter-type="category" data-value="todas">Todas</button>
          <button class="dropdown-item" data-filter-type="category" data-value="masculina">Masculina</button>
          <button class="dropdown-item" data-filter-type="category" data-value="femenina">Femenina</button>
          <button class="dropdown-item" data-filter-type="category" data-value="unisex">Unisex</button>
          <p class="dropdown-label">Marca</p>
          <div id="brandList"></div>
        </div>
      </div>
      <div class="active-filters" id="activeFilters"></div>
    </div>

    <div class="dropdown-wrap">
      <button class="icon-btn" id="searchToggle" aria-haspopup="true" aria-expanded="false" aria-label="Buscar producto">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="url(#goldMetal)" d="M10 2a8 8 0 105.29 14.29l5.2 5.2 1.42-1.41-5.2-5.2A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
      </button>
    </div>

    <div class="dropdown-wrap">
      <button class="icon-btn" id="likesToggle" aria-pressed="false" aria-label="Ver mis Me Gusta">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="url(#goldMetal)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <span class="likes-count" id="likesCount" hidden>0</span>
      </button>
    </div>
  </section>

  <div class="search-panel" id="searchPanel" hidden>
    <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M10 2a8 8 0 105.29 14.29l5.2 5.2 1.42-1.41-5.2-5.2A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
    <input type="search" id="searchInput" placeholder="Buscar por nombre o marca..." aria-label="Buscar producto">
    <button class="search-close" id="searchClose" aria-label="Cerrar búsqueda">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12.01l-6.3-6.3-1.4 1.42 6.29 6.29-6.3 6.3 1.42 1.4 6.29-6.29 6.3 6.3 1.4-1.42-6.29-6.29 6.3-6.3z"/></svg>
    </button>
  </div>

  <p class="results-count" id="resultsCount"></p>

  <section class="product-grid" id="productGrid" aria-live="polite"></section>

  <p class="empty-state" id="emptyState" hidden>No se encontraron productos con esa búsqueda.</p>

</main>

<footer class="site-footer">
  <div class="container">
    <p>&copy; <span id="year"></span> Lociones — Catálogo de perfumes originales.</p>
  </div>
</footer>

<div class="modal-overlay" id="productModal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <button class="modal-close" id="modalClose" aria-label="Cerrar">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12.01l-6.3-6.3-1.4 1.42 6.29 6.29-6.3 6.3 1.42 1.4 6.29-6.29 6.3 6.3 1.4-1.42-6.29-6.29 6.3-6.3z"/></svg>
    </button>
    <button class="like-btn modal-like" id="modalLike" aria-label="Me gusta" aria-pressed="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </button>
    <div class="modal-visual" id="modalVisual"></div>
    <div class="modal-info">
      <p class="modal-brand" id="modalBrand"></p>
      <h2 class="modal-name" id="modalName"></h2>
      <p class="modal-meta" id="modalMeta"></p>
      <div class="modal-notes" id="modalNotes"></div>
      <div class="modal-vibe-block">
        <p class="modal-vibe-label">Cómo se siente</p>
        <p class="modal-vibe" id="modalVibe"></p>
      </div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script src="js/app.js"></script>
</body>
</html>
